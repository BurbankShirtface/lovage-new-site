<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lovage Menu Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #143d2c;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        color: #f7f6e9;
        line-height: 1.6;
        padding: 20px;
        min-height: 100vh;
      }

      .upload-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 2rem;
        background: rgba(15, 47, 35, 0.8);
        border: 1px solid rgba(247, 246, 233, 0.1);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      h2 {
        color: #f7f6e9;
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
        font-weight: 500;
        text-align: center;
      }

      .upload-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .form-group label {
        font-weight: 500;
        color: #f7f6e9;
        font-size: 0.9rem;
      }

      .upload-form input[type="file"] {
        padding: 0.75rem;
        border: 1px solid rgba(247, 246, 233, 0.2);
        border-radius: 8px;
        background-color: rgba(247, 246, 233, 0.05);
        color: #f7f6e9;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .upload-form input[type="file"]:hover {
        border-color: rgba(247, 246, 233, 0.4);
        background-color: rgba(247, 246, 233, 0.08);
      }

      .upload-form select {
        padding: 0.75rem;
        border: 1px solid rgba(247, 246, 233, 0.2);
        border-radius: 8px;
        background-color: rgba(247, 246, 233, 0.05);
        color: #f7f6e9;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .upload-form select:hover {
        border-color: rgba(247, 246, 233, 0.4);
        background-color: rgba(247, 246, 233, 0.08);
      }

      .upload-form select option {
        background-color: #143d2c;
        color: #f7f6e9;
      }

      .upload-form button {
        padding: 0.875rem 1.5rem;
        background-color: #b4b3a6;
        color: #143d2c;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .upload-form button:hover {
        background-color: #c4c3b6;
        transform: translateY(-1px);
      }

      .upload-form button:active {
        transform: translateY(0);
      }

      .message {
        padding: 1rem;
        margin-top: 1rem;
        border-radius: 8px;
        opacity: 0;
        transform: translateY(-10px);
        animation: slideIn 0.3s forwards;
        font-weight: 500;
      }

      @keyframes slideIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .success {
        background-color: rgba(76, 175, 80, 0.2);
        color: #81c784;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }

      .error {
        background-color: rgba(244, 67, 54, 0.2);
        color: #e57373;
        border: 1px solid rgba(244, 67, 54, 0.3);
      }

      .reset-button {
        margin-top: 1.5rem;
        background-color: rgba(244, 67, 54, 0.8);
        color: #f7f6e9;
        padding: 0.75rem 1.5rem;
        border: 1px solid rgba(244, 67, 54, 0.3);
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        transition: all 0.3s ease;
        width: 100%;
      }

      .reset-button:hover {
        background-color: rgba(244, 67, 54, 1);
        border-color: rgba(244, 67, 54, 0.5);
      }

      .file-preview {
        margin-top: 1rem;
        text-align: center;
      }

      .file-preview img {
        max-width: 200px;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }

      .file-preview p {
        color: rgba(247, 246, 233, 0.8);
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }

      .upload-info {
        background: rgba(247, 246, 233, 0.05);
        border: 1px solid rgba(247, 246, 233, 0.1);
        border-radius: 8px;
        padding: 1rem;
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: rgba(247, 246, 233, 0.7);
      }

      .upload-info h4 {
        margin-bottom: 0.5rem;
        color: #f7f6e9;
        font-size: 0.9rem;
      }

      .upload-info ul {
        list-style: none;
        padding-left: 0;
      }

      .upload-info li {
        margin-bottom: 0.25rem;
        padding-left: 1rem;
        position: relative;
      }

      .upload-info li:before {
        content: "•";
        color: #b4b3a6;
        position: absolute;
        left: 0;
      }

      @media (max-width: 768px) {
        .upload-container {
          margin: 20px auto;
          padding: 1.5rem;
        }

        h2 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="upload-container">
      <h2>Lovage Menu Manager</h2>
      <form class="upload-form" id="uploadForm">
        <div class="form-group">
          <label for="document">Select Menu File</label>
          <input
            type="file"
            name="document"
            id="document"
            required
            accept="image/*,.pdf,.heic"
          />
        </div>

        <div class="form-group">
          <label for="menuType">Menu Type</label>
          <select name="menuType" id="menuType" required>
            <option value="">Select a menu type...</option>
            <option value="lunch">Lunch Menu</option>
            <option value="dinner">Dinner Menu</option>
            <option value="drinks">Drinks Menu</option>
          </select>
        </div>

        <button type="submit">Upload Menu</button>
      </form>

      <button id="resetButton" class="reset-button">
        Reset to Default Menus
      </button>

      <div id="message"></div>

      <div class="upload-info">
        <h4>Upload Guidelines:</h4>
        <ul>
          <li>Supported formats: JPEG, PNG, HEIC, WebP, PDF</li>
          <li>Maximum file size: 5MB</li>
          <li>HEIC files will be automatically converted to JPEG</li>
          <li>Uploading a new menu will replace the existing one</li>
        </ul>
      </div>
    </div>

    <script>
      document
        .getElementById("uploadForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const messageDiv = document.getElementById("message");
          const submitButton = e.target.querySelector('button[type="submit"]');

          // Validate form
          const menuType = formData.get("menuType");
          if (!menuType) {
            messageDiv.className = "message error";
            messageDiv.textContent = "Please select a menu type";
            return;
          }

          // Show loading state
          submitButton.textContent = "Uploading...";
          submitButton.disabled = true;
          messageDiv.className = "";
          messageDiv.textContent = "";

          try {
            const response = await fetch("/upload", {
              method: "POST",
              body: formData,
            });

            const data = await response.json();

            if (response.ok) {
              messageDiv.className = "message success";
              messageDiv.textContent = `${data.message} - ${menuType} menu updated successfully!`;
              e.target.reset(); // Clear the form
              document.querySelector(".file-preview").innerHTML = "";
            } else {
              messageDiv.className = "message error";
              messageDiv.textContent = data.error || "Upload failed";
            }
          } catch (error) {
            messageDiv.className = "message error";
            messageDiv.textContent =
              "An error occurred during upload. Please try again.";
            console.error("Upload error:", error);
          } finally {
            // Reset button state
            submitButton.textContent = "Upload Menu";
            submitButton.disabled = false;
          }
        });

      // File preview functionality
      const fileInput = document.querySelector('input[type="file"]');
      const previewDiv = document.createElement("div");
      previewDiv.className = "file-preview";
      fileInput.after(previewDiv);

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) {
          previewDiv.innerHTML = "";
          return;
        }

        if (file.type.startsWith("image/")) {
          const img = document.createElement("img");
          img.src = URL.createObjectURL(file);
          img.style.maxWidth = "200px";
          previewDiv.innerHTML = "";
          previewDiv.appendChild(img);

          // Add file info
          const fileInfo = document.createElement("p");
          fileInfo.textContent = `${file.name} (${(
            file.size /
            1024 /
            1024
          ).toFixed(2)} MB)`;
          previewDiv.appendChild(fileInfo);
        } else {
          previewDiv.innerHTML = `<p>Selected: ${file.name} (${(
            file.size /
            1024 /
            1024
          ).toFixed(2)} MB)</p>`;
        }
      });

      // Reset functionality
      document
        .getElementById("resetButton")
        .addEventListener("click", async () => {
          const messageDiv = document.getElementById("message");

          if (
            !confirm(
              "Are you sure you want to reset to default menus? This will delete all current uploaded menus."
            )
          ) {
            return;
          }

          const resetButton = document.getElementById("resetButton");
          resetButton.textContent = "Resetting...";
          resetButton.disabled = true;

          try {
            const response = await fetch("/reset-menus", {
              method: "POST",
            });

            const data = await response.json();

            if (response.ok) {
              messageDiv.className = "message success";
              messageDiv.textContent = data.message;
            } else {
              messageDiv.className = "message error";
              messageDiv.textContent = data.error || "Reset failed";
            }
          } catch (error) {
            messageDiv.className = "message error";
            messageDiv.textContent =
              "An error occurred during reset. Please try again.";
            console.error("Reset error:", error);
          } finally {
            resetButton.textContent = "Reset to Default Menus";
            resetButton.disabled = false;
          }
        });
    </script>
  </body>
</html>
